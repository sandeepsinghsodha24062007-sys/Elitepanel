<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASTXERA PRO | SMM PANEL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #5468ff; --gold: #ff9f43; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }

        header { padding: 15px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232a35; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: 800; color: var(--gold); letter-spacing: 1px; }

        .live-stats { background: rgba(255, 159, 67, 0.1); margin: 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-around; border: 1px solid rgba(255, 159, 67, 0.2); }
        .stat-box { text-align: center; }
        .stat-box b { display: block; color: var(--gold); font-size: 18px; }
        .stat-box span { font-size: 10px; color: #7b849a; }

        .tabs { display: flex; overflow-x: auto; padding: 0 15px 15px; gap: 10px; scrollbar-width: none; }
        .tab-item { padding: 10px 22px; background: #1c222d; border-radius: 50px; font-size: 14px; font-weight: 600; color: #7b849a; border: 1px solid #232a35; white-space: nowrap; }
        .tab-item.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(84, 104, 255, 0.4); }

        .content { padding: 0 15px 100px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #232a35; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--gold); }
        .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
        .price { font-size: 26px; font-weight: 800; color: #2ecc71; }
        .buy-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; font-size: 14px; }

        #order-popup { position: fixed; bottom: 20px; left: 20px; background: #000; border: 1px solid var(--gold); padding: 10px 15px; border-radius: 10px; display: none; z-index: 9999; animation: slideIn 0.5s; font-size: 12px; }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .wa-support { position: fixed; bottom: 85px; right: 20px; background: #25d366; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 1000; color: white; text-decoration: none; }

        #pay-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; flex-direction: column; }
        .pay-header { padding: 20px; border-bottom: 1px solid #232a35; display: flex; align-items: center; font-weight: 700; }
        .pay-body { padding: 30px; text-align: center; }
        .qr-wrap { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; border: 4px solid var(--accent); }
        .link-input { width: 100%; background: var(--card); border: 1px solid #232a35; padding: 18px; border-radius: 12px; color: white; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">FASTXERA PRO</div>
    <div style="color: #2ecc71; font-size: 12px;"><i class="fas fa-circle"></i> SYSTEM LIVE</div>
</header>

<div class="live-stats">
    <div class="stat-box"><b>48k+</b><span>Total Users</span></div>
    <div class="stat-box"><b>1,240</b><span>Orders Today</span></div>
    <div class="stat-box"><b>0.5s</b><span>Speed</span></div>
</div>

<div class="tabs">
    <div class="tab-item active">Instagram</div>
    <div class="tab-item">YouTube</div>
    <div class="tab-item">Telegram</div>
</div>

<div class="content">
    <div class="card" onclick="openPay('10k Followers', 159)">
        <div><h3>10,000 Instagram Followers</h3><div class="price">₹159</div></div>
        <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card" onclick="openPay('5k Likes', 79)">
        <div><h3>5,000 High Quality Likes</h3><div class="price">₹79</div></div>
        <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card" onclick="openPay('1k YouTube Subs', 299)">
        <div><h3>1,000 YouTube Subscribers</h3><div class="price">₹299</div></div>
        <button class="buy-btn">Buy Now</button>
    </div>
</div>

<a href="https://wa.me/91XXXXXXXXXX" class="wa-support"><i class="fab fa-whatsapp"></i></a>
<div id="order-popup">🔥 Someone just bought followers!</div>

<div id="pay-ui">
    <div class="pay-header" onclick="location.reload()"><i class="fas fa-arrow-left"></i> &nbsp; Back to Menu</div>
    <div class="pay-body">
        <h1 id="p-amt" style="font-size: 45px; color: #2ecc71;">₹0</h1>
        <p style="color: #7b849a; margin-bottom: 20px;">Safe & Secure Payment</p>
        <input type="text" id="target-link" class="link-input" placeholder="Paste Link/Username Here">
        <div class="qr-wrap"><img id="qr-img" src="" style="width: 200px; height: 200px;"></div>
        <button class="buy-btn" style="width: 100%; padding: 20px; font-size: 18px;" onclick="processPay()">PAY
